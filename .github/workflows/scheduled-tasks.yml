name: Scheduled Tasks

on:
  schedule:
    - cron: '30 2 * * 1'
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scheduled-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print Trigger
        run: echo "Triggered by ${{ github.event.schedule }}"

      - name: Health Check
        run: |
          curl -o /dev/null -s -w "%{http_code}" https://github.com/karinasayta1/github-actions-practice/