name: Docker CI/CD Pipeline

on:
  workflow_dispatch


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t python-app .
      
      - name: Docker tag
        run: docker tag python-app karinasayta1/python-app:latest