name: Artifact Sharing

on: workflow_dispatch

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello from Job1" > file.txt

      - uses: actions/upload-artifact@v4
        with:
          name: shared-file
          path: file.txt

  job2:
    runs-on: ubuntu-latest
    needs: job1

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: shared-file

      - run: cat file.txt