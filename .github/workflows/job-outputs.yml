name: Job Outputs Demo

on: push

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      today_date: ${{ steps.set_date.outputs.date }}

    steps:
      - name: Set Date
        id: set_date
        run: echo "date=$(date)" >> $GITHUB_OUTPUT

  consume:
    runs-on: ubuntu-latest
    needs: generate

    steps:
      - name: Print Date
        run: echo "Date from previous job: ${{ needs.generate.outputs.today_date }}"