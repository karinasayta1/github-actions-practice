name: Upload Artifact

on: 
  # push
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create file
        run: echo "This is a test report" > report.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-report
          path: report.txt