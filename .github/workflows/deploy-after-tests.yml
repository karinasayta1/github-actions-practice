name: Deploy After Tests

on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - run: echo "Deploying..."

  fail:
    if: github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest

    steps:
      - run: echo "Tests failed. Not deploying."